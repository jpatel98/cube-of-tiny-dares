name: Bug report
description: Something is broken or surprising.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make the cube less cursed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: "When I tap the cube after entering..., it..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python3 app.py`
        2. Enter context `...`
        3. Tap the cube
        4. See `...`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, browser, ESP32 board if hardware-related"
