[env:tiny_dares]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.memory_type = qio_opi
; Canonical name in espressif32 6.x for selecting the bundled sdkconfig variant
; that enables OPI PSRAM. Without this, PSRAM is detected as 0 bytes at runtime.
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  -DLV_CONF_INCLUDE_SIMPLE
  -I src
monitor_speed = 115200
upload_speed = 115200    ; Waveshare docs and Codex notes both recommend 115200
upload_flags =
  --no-stub              ; This board's ROM path flashes reliably; esptool's RAM stub fails flash verify.
lib_deps =
  ; Pin Arduino_GFX to 1.4.4 — 1.4.5+ requires arduino-esp32 3.x
  ; (esp32-hal-periman.h). espressif32@6.7.0 ships arduino-esp32 2.0.14.
  moononournation/GFX Library for Arduino@1.4.4
  lewisxhe/SensorLib@^0.2.0
  lvgl/lvgl@^8.4.0
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.0.4
